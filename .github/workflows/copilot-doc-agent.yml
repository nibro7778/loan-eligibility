name: Copilot Doc Agent

on:
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"

  workflow_dispatch:  #allows manual triggering of the workflow from the GitHub Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run Copilot doc-agent
        run: |
          gh copilot --agent=doc-agent --prompt "
          Review the latest git changes and update README.md accordingly.

          Steps:
          1. Analyse the latest commit diff
          2. Update documentation if functionality changed
          3. Keep existing sections intact
          4. Only modify README.md
          "

      - name: Create Pull Request if README changed
        run: |
          if git diff --quiet README.md; then
            echo "No documentation changes required"
            exit 0
          fi

          BRANCH=docs/copilot-readme-update
          git checkout -b $BRANCH

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add README.md
          git commit -m "docs: update README via Copilot doc-agent"
          git push origin $BRANCH

          gh pr create \
            --title "📚 README update by Copilot doc-agent" \
            --body "Automated documentation update generated by Copilot agent." \
            --base master \
            --head $BRANCH