name: OpenAI Doc Agent

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # IMPORTANT for git diff

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install openai

      # ✅ NEW: Run deterministic doc agent
      - name: Generate README from diff
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python tools/doc_agent/main.py

      - name: Create Pull Request if README changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet README.md; then
            echo "No documentation changes required"
            exit 0
          fi

          BRANCH=docs/readme-update-${{ github.run_id }}
          git checkout -b $BRANCH

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add README.md
          git commit -m "docs: update README via doc-agent"
          git push origin $BRANCH

          gh pr create \
            --title "📚 README update by doc-agent" \
            --body "Automated documentation update generated from git diff." \
            --base master \
            --head $BRANCH